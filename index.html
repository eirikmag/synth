<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaktLite</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== ARP POPUP ===== -->
  <div class="arp-popup" id="arp-popup">
    <div class="arp-popup-inner">
      <div class="section-label">ARPEGGIATOR</div>
      <div class="arp-controls">
        <div class="knob-group">
          <label>Division</label>
          <div class="arp-div-selector">
            <button class="arp-div-btn" data-div="1/4">1/4</button>
            <button class="arp-div-btn active" data-div="1/8">1/8</button>
            <button class="arp-div-btn" data-div="1/16">1/16</button>
            <button class="arp-div-btn" data-div="1/32">1/32</button>
          </div>
        </div>
        <div class="knob-group">
          <label>Pattern</label>
          <div class="arp-mode-selector">
            <button class="arp-mode-btn active" data-arpmode="up">UP</button>
            <button class="arp-mode-btn" data-arpmode="down">DN</button>
            <button class="arp-mode-btn" data-arpmode="random">RND</button>
          </div>
        </div>
        <div class="knob-group">
          <button class="arp-sync-btn" id="arp-sync">SYNC</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== EFFECTS POPUP ===== -->
  <div class="fx-popup" id="fx-popup">
    <div class="fx-popup-inner">
      <div class="section-label">EFFECTS</div>
      <div class="fx-controls">
        <div class="fx-effect-group">
          <button class="effect-toggle-btn" id="chorus-toggle">CHORUS</button>
          <div class="effect-params" id="chorus-params">
            <div class="filter-slider-row">
              <label>Rate</label>
              <input type="range" id="chorus-rate" class="knob-slider filter-knob" min="0.1" max="10" step="0.1" value="1.5" />
              <span class="knob-value" id="chorus-rate-value">1.5 Hz</span>
            </div>
            <div class="filter-slider-row">
              <label>Depth</label>
              <input type="range" id="chorus-depth" class="knob-slider filter-knob" min="0" max="10" step="0.1" value="3.0" />
              <span class="knob-value" id="chorus-depth-value">3.0 ms</span>
            </div>
            <div class="filter-slider-row">
              <label>Width</label>
              <input type="range" id="chorus-width" class="knob-slider filter-knob" min="0" max="100" step="1" value="50" />
              <span class="knob-value" id="chorus-width-value">50%</span>
            </div>
            <div class="filter-slider-row">
              <label>HPC</label>
              <input type="range" id="chorus-hpc" class="knob-slider filter-knob" min="20" max="2000" step="1" value="200" />
              <span class="knob-value" id="chorus-hpc-value">200 Hz</span>
            </div>
            <div class="filter-slider-row">
              <label>Mix</label>
              <input type="range" id="chorus-mix" class="knob-slider filter-knob" min="0" max="100" step="1" value="50" />
              <span class="knob-value" id="chorus-mix-value">50%</span>
            </div>
          </div>
        </div>
        <div class="fx-effect-group">
          <button class="effect-toggle-btn" id="reverb-toggle">REVERB</button>
          <div class="effect-params" id="reverb-params">
            <div class="filter-slider-row">
              <label>Decay</label>
              <input type="range" id="reverb-decay" class="knob-slider filter-knob" min="0.1" max="10" step="0.1" value="2.0" />
              <span class="knob-value" id="reverb-decay-value">2.0s</span>
            </div>
            <div class="filter-slider-row">
              <label>Mix</label>
              <input type="range" id="reverb-mix" class="knob-slider filter-knob" min="0" max="100" step="1" value="30" />
              <span class="knob-value" id="reverb-mix-value">30%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PROJECT POPUP ===== -->
  <div class="project-popup" id="project-popup">
    <div class="project-popup-inner">
      <div class="section-label">PROJECT</div>
      <div class="project-controls">
        <div class="project-name-row">
          <input type="text" id="project-name" class="project-name-input" placeholder="Project name" value="Untitled" />
        </div>
        <div class="project-actions">
          <button class="project-action-btn" id="project-save">SAVE</button>
          <button class="project-action-btn" id="project-export">EXPORT</button>
          <button class="project-action-btn" id="project-import">IMPORT</button>
          <input type="file" id="project-import-file" accept=".json" class="hidden" />
        </div>
        <div class="project-stored">
          <div class="project-stored-label">STORED PROJECTS</div>
          <div class="project-list" id="project-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="app">

    <!-- SVG overlay for LFO drag routing -->
    <svg class="lfo-drag-overlay" id="lfo-drag-overlay">
      <line id="lfo-drag-line" x1="0" y1="0" x2="0" y2="0" />
    </svg>

    <!-- ===== TRANSPORT BAR ===== -->
    <div class="transport-bar">
      <span class="brand">TAKTLITE</span>
      <div class="transport-controls">
        <button class="transport-btn" id="seq-play">&#9654; PLAY</button>
        <button class="transport-btn transport-rec" id="seq-rec">&#9679; REC</button>
        <button class="transport-btn transport-panic" id="seq-panic" title="Kill all sound">&#9888; PANIC</button>
      </div>
      <div class="transport-metro-group">
        <button class="transport-metro-btn" id="metro-btn" title="Metronome">&#119136;</button>
        <button class="transport-metro-btn" id="preroll-btn" title="1-bar preroll before recording">PRE</button>
      </div>
      <div class="global-tempo">
        <button class="tempo-btn" id="tempo-down">-</button>
        <span class="tempo-display" id="tempo-display">120 BPM</span>
        <button class="tempo-btn" id="tempo-up">+</button>
      </div>
      <div class="master-vol-group">
        <label>VOL</label>
        <input type="range" id="master-vol" class="master-vol-slider" min="0" max="1" step="0.01" value="0.8" />
      </div>
      <button class="transport-util-btn" id="fx-btn">FX</button>
      <button class="transport-util-btn" id="project-btn">FILE</button>
      <div id="note-display" class="note-display">—</div>
    </div>

    <!-- ===== SEQUENCER (main content) ===== -->
    <div class="sequencer">
      <div class="seq-toolbar">
        <div class="seq-page-nav" id="seq-page-nav">
          <label>PAGE</label>
          <button class="seq-page-btn active" data-page="0">1</button>
          <button class="seq-page-btn" data-page="1">2</button>
          <button class="seq-page-btn" data-page="2">3</button>
          <button class="seq-page-btn" data-page="3">4</button>
          <button class="seq-page-btn" data-page="4">5</button>
          <button class="seq-page-btn" data-page="5">6</button>
          <button class="seq-page-btn" data-page="6">7</button>
          <button class="seq-page-btn" data-page="7">8</button>
        </div>
        <div class="seq-master-length" id="seq-master-length">
          <label>LOOP</label>
          <button class="master-len-btn" id="master-len-down">&minus;</button>
          <span class="master-len-display" id="master-len-display">OFF</span>
          <button class="master-len-btn" id="master-len-up">+</button>
        </div>
        <div class="seq-actions">
          <button class="seq-action-btn" id="seq-clear">CLR</button>
          <div class="seq-preset-group">
            <label>ANVIL</label>
            <button class="seq-drum-preset-btn" data-preset="basic">BASIC</button>
            <button class="seq-drum-preset-btn" data-preset="house">HOUSE</button>
            <button class="seq-drum-preset-btn" data-preset="hiphop">HIP</button>
            <button class="seq-drum-preset-btn" data-preset="electro">ELEC</button>
          </div>
        </div>
      </div>
      <div class="seq-body">
        <div class="seq-grid" id="seq-grid">
          <!-- built by JS -->
        </div>
        <div class="track-fx-panel" id="track-fx-panel">
          <div class="track-fx-header">
            <span class="track-fx-title" id="track-fx-title">FX</span>
            <button class="track-fx-close" id="track-fx-close">&times;</button>
          </div>
          <div class="track-fx-body" id="track-fx-body"></div>
        </div>
      </div>
    </div>

    <!-- ===== SYNTH ENGINE PANEL (collapsible) ===== -->
    <div class="synth-panel" id="synth-panel">
      <div class="synth-panel-header" id="synth-panel-header">
        <span class="synth-panel-title" id="synth-panel-title">FORGE ENGINE</span>
        <div class="synth-panel-mode">
          <button class="mode-btn active" data-mode="mono">MONO</button>
          <button class="mode-btn" data-mode="poly">POLY</button>
          <button class="mode-btn" data-mode="arp">ARP</button>
        </div>
        <span class="synth-panel-arrow" id="synth-panel-toggle">&#9660;</span>
      </div>
      <div class="synth-panel-body" id="synth-panel-body">

        <!-- Dynamic track params area (drum/sample controls, pages/steps, chain modules) -->
        <div class="track-params-view hidden" id="track-params-view"></div>

        <div class="panel-sections" id="synth-sections">

          <!-- OSCILLATORS -->
          <div class="osc-stack">

            <!-- OSC 1 -->
            <div class="section osc-section">
              <div class="section-label">OSC 1</div>
              <div class="section-body">
                <div class="knob-group">
                  <label>Type</label>
                  <div class="waveform-selector">
                    <button class="waveform-btn active" data-osc="1" data-waveform="sawtooth">SAW</button>
                    <button class="waveform-btn" data-osc="1" data-waveform="square">SQR</button>
                    <button class="waveform-btn" data-osc="1" data-waveform="sine">SIN</button>
                    <button class="waveform-btn" data-osc="1" data-waveform="triangle">TRI</button>
                  </div>
                </div>
                <div class="knob-group" data-route-target="osc1-volume">
                  <label>Vol</label>
                  <input type="range" id="osc1-volume" class="adsr-slider" min="0" max="1" step="0.01" value="0.5" />
                  <span class="knob-value" id="osc1-volume-value">50%</span>
                </div>
                <div class="knob-group" data-route-target="osc1-shape">
                  <label>Shape</label>
                  <input type="range" id="osc1-shape" class="adsr-slider" min="0" max="1" step="0.01" value="0" />
                  <span class="knob-value" id="osc1-shape-value">0%</span>
                </div>
                <div class="knob-group" data-route-target="osc1-pitch">
                  <label>Pitch</label>
                  <input type="range" id="osc1-pitch" class="adsr-slider" min="-7" max="7" step="0.01" value="0" />
                  <span class="knob-value" id="osc1-pitch-value">0.00 st</span>
                </div>
                <div class="knob-group">
                  <label>Oct</label>
                  <input type="range" id="osc1-octave" class="adsr-slider" min="-3" max="3" step="1" value="0" />
                  <span class="knob-value" id="osc1-octave-value">0</span>
                </div>
              </div>
            </div>

            <!-- OSC 2 -->
            <div class="section osc-section">
              <div class="section-label">OSC 2</div>
              <div class="section-body">
                <div class="knob-group">
                  <label>Type</label>
                  <div class="waveform-selector">
                    <button class="waveform-btn" data-osc="2" data-waveform="sawtooth">SAW</button>
                    <button class="waveform-btn active" data-osc="2" data-waveform="square">SQR</button>
                    <button class="waveform-btn" data-osc="2" data-waveform="sine">SIN</button>
                    <button class="waveform-btn" data-osc="2" data-waveform="triangle">TRI</button>
                  </div>
                </div>
                <div class="knob-group" data-route-target="osc2-volume">
                  <label>Vol</label>
                  <input type="range" id="osc2-volume" class="adsr-slider" min="0" max="1" step="0.01" value="0" />
                  <span class="knob-value" id="osc2-volume-value">0%</span>
                </div>
                <div class="knob-group" data-route-target="osc2-shape">
                  <label>Shape</label>
                  <input type="range" id="osc2-shape" class="adsr-slider" min="0" max="1" step="0.01" value="0" />
                  <span class="knob-value" id="osc2-shape-value">0%</span>
                </div>
                <div class="knob-group" data-route-target="osc2-pitch">
                  <label>Pitch</label>
                  <input type="range" id="osc2-pitch" class="adsr-slider" min="-7" max="7" step="0.01" value="0" />
                  <span class="knob-value" id="osc2-pitch-value">0.00 st</span>
                </div>
                <div class="knob-group">
                  <label>Oct</label>
                  <input type="range" id="osc2-octave" class="adsr-slider" min="-3" max="3" step="1" value="0" />
                  <span class="knob-value" id="osc2-octave-value">0</span>
                </div>
              </div>
            </div>

            <!-- OSC 3 (PLAITS) -->
            <div class="section osc3-section">
              <div class="section-label">PLAITS</div>
              <div class="section-body osc3-body">
                <div class="osc3-top">
                  <div class="knob-group">
                    <label>Engine</label>
                    <div class="osc3-mode-selector">
                      <button class="osc3-mode-btn active" data-altmode="string">STR</button>
                      <button class="osc3-mode-btn" data-altmode="fm">FM</button>
                      <button class="osc3-mode-btn" data-altmode="formant">VOX</button>
                    </div>
                  </div>
                  <div class="knob-group" data-route-target="osc3-volume">
                    <label>Vol</label>
                    <input type="range" id="osc3-volume" class="adsr-slider" min="0" max="1" step="0.01" value="0" />
                    <span class="knob-value" id="osc3-volume-value">0%</span>
                  </div>
                  <div class="knob-group" data-route-target="osc3-pitch">
                    <label>Pitch</label>
                    <input type="range" id="osc3-pitch" class="adsr-slider" min="-7" max="7" step="0.01" value="0" />
                    <span class="knob-value" id="osc3-pitch-value">0.00 st</span>
                  </div>
                  <div class="knob-group">
                    <label>Oct</label>
                    <input type="range" id="osc3-octave" class="adsr-slider" min="-3" max="3" step="1" value="0" />
                    <span class="knob-value" id="osc3-octave-value">0</span>
                  </div>
                </div>
                <div class="osc3-params" id="osc3-string-params">
                  <div class="filter-slider-row" data-route-target="osc3-color">
                    <label>Color</label>
                    <input type="range" id="osc3-color" class="knob-slider filter-knob" min="0" max="1" step="0.01" value="0.5" />
                    <span class="knob-value" id="osc3-color-value">50%</span>
                  </div>
                  <div class="filter-slider-row" data-route-target="osc3-damping">
                    <label>Damp</label>
                    <input type="range" id="osc3-damping" class="knob-slider filter-knob" min="0" max="1" step="0.01" value="0.5" />
                    <span class="knob-value" id="osc3-damping-value">50%</span>
                  </div>
                </div>
                <div class="osc3-params hidden" id="osc3-fm-params">
                  <div class="filter-slider-row" data-route-target="osc3-ratio">
                    <label>Ratio</label>
                    <input type="range" id="osc3-ratio" class="knob-slider filter-knob" min="0.5" max="12" step="0.1" value="2" />
                    <span class="knob-value" id="osc3-ratio-value">2.0</span>
                  </div>
                  <div class="filter-slider-row" data-route-target="osc3-index">
                    <label>Index</label>
                    <input type="range" id="osc3-index" class="knob-slider filter-knob" min="0" max="20" step="0.1" value="3" />
                    <span class="knob-value" id="osc3-index-value">3.0</span>
                  </div>
                </div>
                <div class="osc3-params hidden" id="osc3-formant-params">
                  <div class="filter-slider-row" data-route-target="osc3-morph">
                    <label>Morph</label>
                    <input type="range" id="osc3-morph" class="knob-slider filter-knob" min="0" max="1" step="0.01" value="0" />
                    <span class="knob-value" id="osc3-morph-value">A</span>
                  </div>
                  <div class="filter-slider-row" data-route-target="osc3-vibrato">
                    <label>Vibrato</label>
                    <input type="range" id="osc3-vibrato" class="knob-slider filter-knob" min="0" max="1" step="0.01" value="0.3" />
                    <span class="knob-value" id="osc3-vibrato-value">30%</span>
                  </div>
                </div>
              </div>
            </div>

          </div><!-- /osc-stack -->

          <!-- FILTER -->
          <div class="section">
            <div class="section-label">FILTER</div>
            <div class="section-body filter-body">
              <div class="knob-group">
                <label>Type</label>
                <div class="filter-type-selector">
                  <button class="filter-type-btn active" data-ftype="lowpass">LP</button>
                  <button class="filter-type-btn" data-ftype="highpass">HP</button>
                  <button class="filter-type-btn" data-ftype="bandpass">BP</button>
                  <button class="filter-type-btn" data-ftype="notch">NCH</button>
                  <button class="filter-type-btn" data-ftype="lowshelf">LS</button>
                  <button class="filter-type-btn" data-ftype="highshelf">HS</button>
                </div>
              </div>
              <div class="knob-group" id="filter-model-group">
                <label>Model</label>
                <div class="filter-model-selector">
                  <button class="filter-model-btn active" data-model="svf12">SVF12</button>
                  <button class="filter-model-btn" data-model="svf24">SVF24</button>
                  <button class="filter-model-btn" data-model="rd3">RD3</button>
                  <button class="filter-model-btn" data-model="mg">MG</button>
                  <button class="filter-model-btn" data-model="ob12">OB12</button>
                  <button class="filter-model-btn" data-model="ob24">OB24</button>
                  <button class="filter-model-btn" data-model="cst">CST</button>
                </div>
              </div>
              <div class="filter-slider-row" data-route-target="filter-cutoff">
                <label>Cutoff</label>
                <input type="range" id="filter-cutoff" class="knob-slider filter-knob" min="0" max="1000" step="1" value="1000" />
                <span class="knob-value" id="filter-cutoff-value">20.0k</span>
              </div>
              <div class="filter-slider-row" id="filter-q-group" data-route-target="filter-q">
                <label>Reso</label>
                <input type="range" id="filter-q" class="knob-slider filter-knob" min="0.01" max="30" step="0.01" value="0.5" />
                <span class="knob-value" id="filter-q-value">0.50</span>
              </div>
              <div class="filter-slider-row hidden" id="filter-gain-group" data-route-target="filter-gain">
                <label>Gain</label>
                <input type="range" id="filter-gain" class="knob-slider filter-knob" min="-24" max="24" step="0.1" value="0" />
                <span class="knob-value" id="filter-gain-value">+0.0 dB</span>
              </div>
            </div>
          </div>

          <!-- DISPLAY + ENVELOPE + LFO -->
          <div class="display-env-stack">
            <div class="section display-section">
              <div class="section-label">DISPLAY</div>
              <div class="oled">
                <canvas id="oscilloscope"></canvas>
              </div>
            </div>

            <div class="section">
              <div class="section-label">ENVELOPE</div>
              <div class="section-body adsr-row">
                <div class="adsr-knob">
                  <label>A</label>
                  <input type="range" class="adsr-slider" id="attack" min="0.001" max="2" step="0.001" value="0.01" />
                  <span class="knob-value" id="attack-value">10ms</span>
                </div>
                <div class="adsr-knob">
                  <label>D</label>
                  <input type="range" class="adsr-slider" id="decay" min="0.001" max="2" step="0.001" value="0.1" />
                  <span class="knob-value" id="decay-value">100ms</span>
                </div>
                <div class="adsr-knob">
                  <label>S</label>
                  <input type="range" class="adsr-slider" id="sustain" min="0" max="1" step="0.01" value="0.7" />
                  <span class="knob-value" id="sustain-value">70%</span>
                </div>
                <div class="adsr-knob">
                  <label>R</label>
                  <input type="range" class="adsr-slider" id="release" min="0.001" max="3" step="0.001" value="0.3" />
                  <span class="knob-value" id="release-value">300ms</span>
                </div>
              </div>
            </div>

            <div class="section lfo-section">
              <div class="section-label">LFO</div>
              <div class="section-body lfo-body">
                <div class="lfo-controls">
                  <div class="lfo-wave-selector">
                    <button class="lfo-wave-btn active" data-lfowave="sine">SIN</button>
                    <button class="lfo-wave-btn" data-lfowave="triangle">TRI</button>
                    <button class="lfo-wave-btn" data-lfowave="square">SQR</button>
                    <button class="lfo-wave-btn" data-lfowave="sawtooth">SAW</button>
                    <button class="lfo-wave-btn" data-lfowave="snh">S&amp;H</button>
                  </div>
                  <div class="lfo-rate-row">
                    <label>Rate</label>
                    <input type="range" id="lfo-rate" class="knob-slider" min="0.05" max="20" step="0.05" value="1" />
                    <span class="knob-value" id="lfo-rate-value">1.0 Hz</span>
                  </div>
                </div>
                <div class="lfo-routing">
                  <div class="lfo-route-pin" id="lfo-route-pin" title="Drag to a parameter to route LFO"></div>
                  <div class="lfo-route-list" id="lfo-route-list"></div>
                </div>
              </div>
            </div>
          </div><!-- /display-env-stack -->

        </div><!-- /panel-sections -->

        <div class="keyboard-area hidden" id="keyboard-area">
          <section id="piano" class="piano"></section>
        </div>
        <div class="keyboard-toggle" id="keyboard-toggle" title="Toggle keyboard">
          <svg viewBox="0 0 32 14" width="32" height="14">
            <rect x="0" y="0" width="4" height="14" rx="0.5" fill="#ccc"/>
            <rect x="5" y="0" width="4" height="14" rx="0.5" fill="#ccc"/>
            <rect x="10" y="0" width="4" height="14" rx="0.5" fill="#ccc"/>
            <rect x="15" y="0" width="4" height="14" rx="0.5" fill="#ccc"/>
            <rect x="20" y="0" width="4" height="14" rx="0.5" fill="#ccc"/>
            <rect x="25" y="0" width="3" height="14" rx="0.5" fill="#ccc"/>
            <rect x="29" y="0" width="3" height="14" rx="0.5" fill="#ccc"/>
