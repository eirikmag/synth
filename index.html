<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="synth-panel">
    <header>
      <h1>SYNTH</h1>
      <div id="note-display" class="note-display">—</div>
    </header>

    <section class="controls">
      <!-- Waveform selector -->
      <div class="control-group">
        <label>Waveform</label>
        <div class="waveform-selector">
          <button class="waveform-btn" data-waveform="sine">Sine</button>
          <button class="waveform-btn" data-waveform="square">Square</button>
          <button class="waveform-btn active" data-waveform="sawtooth">Saw</button>
          <button class="waveform-btn" data-waveform="triangle">Triangle</button>
        </div>
      </div>

      <!-- Volume -->
      <div class="control-group">
        <label>Volume</label>
        <div class="slider-row">
          <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" />
          <span id="volume-value">50%</span>
        </div>
      </div>
    </section>

    <!-- Oscilloscope -->
    <section class="scope-wrap">
      <canvas id="oscilloscope"></canvas>
    </section>

    <!-- Visual keyboard -->
    <section id="piano" class="piano"></section>

    <footer>
      <p>Play with your keyboard — bottom two rows are the lower octave, top rows the upper octave.</p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
